    "vars": {
      "PROJECT_NAME": "my-robots",
      "PYTHONUNBUFFERED": "1"
    },
    "hook": {
      "on-activate": "  echo \"🤖 Activating my-robots environment...\"\n  \n  # Create venv if it doesn't exist\n  if [ ! -d \"$FLOX_ENV_PROJECT/venv\" ]; then\n    echo \"📦 Creating Python virtual environment...\"\n    python3 -m venv \"$FLOX_ENV_PROJECT/venv\"\n    echo \"✅ Virtual environment created\"\n  fi\n  \n  # Check if Doppler is configured for this project\n  if doppler configure get project.name >/dev/null 2>&1; then\n    DOPPLER_PROJECT=$(doppler configure get project.name 2>/dev/null)\n    DOPPLER_CONFIG=$(doppler configure get config.name 2>/dev/null)\n    echo \"🔐 Doppler configured: $DOPPLER_PROJECT ($DOPPLER_CONFIG)\"\n    echo \"💡 Use: doppler run -- python main.py\"\n  elif [ -f \"$FLOX_ENV_PROJECT/.env\" ]; then\n    # Fallback to .env if Doppler not configured\n    set -a\n    source \"$FLOX_ENV_PROJECT/.env\"\n    set +a\n    echo \"✅ Environment variables loaded from .env\"\n  else\n    echo \"⚠️  No Doppler config or .env file found.\"\n    echo \"   Run ./setup.sh to configure secrets\"\n  fi\n  \n  echo \"💡 Python venv: ./venv/bin/python\"\n  echo \"💡 With Doppler: doppler run -- python main.py\"\n  echo \"💡 Without Doppler: python main.py (uses .env)\"\n"
    },
    "profile": {
      "common": "  # Add venv bin to PATH if venv exists\n  if [ -d \"$FLOX_ENV_PROJECT/venv/bin\" ]; then\n    export PATH=\"$FLOX_ENV_PROJECT/venv/bin:$PATH\"\n  fi\n"
    },
    "options": {
      "systems": [
        "aarch64-linux",
        "x86_64-linux",
        "aarch64-darwin",
        "x86_64-darwin"
      ]
    }
  },
