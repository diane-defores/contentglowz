<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContentGlowz Sign In</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/clerk-auth.css" />
    <script src="/clerk-runtime.js"></script>
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <div class="eyebrow">ClerkJS Sign-In</div>
        <h1>Continue with Google</h1>
        <p>
          ContentGlowz web authentication now runs directly on the app domain with the
          official Clerk JavaScript SDK and Clerk's prebuilt sign-in component.
        </p>
        <div class="stack">
          <div id="clerk-sign-in"></div>
          <button id="copy-button" class="button button-secondary" type="button">
            Copy diagnostics
          </button>
          <button id="entry-button" class="button button-secondary" type="button">
            Back to app entry
          </button>
        </div>
        <div id="status" class="status">Loading Clerk sign-in…</div>
        <div id="meta" class="meta"></div>
      </section>
    </main>

    <script>
      (function () {
        const bridge = window.contentglowzClerkBridge;
        const signInNode = document.getElementById('clerk-sign-in');
        const copyButton = document.getElementById('copy-button');
        const entryButton = document.getElementById('entry-button');
        const statusEl = document.getElementById('status');
        const metaEl = document.getElementById('meta');
        let lastError = '';

        function setStatus(message, isError) {
          statusEl.textContent = message;
          statusEl.classList.toggle('error', Boolean(isError));
          if (isError) {
            lastError = message;
          }
        }

        function buildDiagnostics() {
          const diagnostics = bridge.getDiagnostics();
          return [
            'ContentGlowz sign-in diagnostics',
            `Build commit: ${diagnostics.buildCommitSha}`,
            `Build environment: ${diagnostics.buildEnvironment}`,
            `Build timestamp: ${diagnostics.buildTimestamp}`,
            `Configured app URL: ${diagnostics.configuredAppWebUrl}`,
            `Configured app host: ${diagnostics.configuredAppHost}`,
            `Current origin: ${diagnostics.currentOrigin}`,
            `Current host: ${diagnostics.currentHost}`,
            `Current path: ${diagnostics.currentPath}`,
            `Current origin matches configured app: ${diagnostics.currentOriginMatchesConfiguredApp}`,
            `OAuth callback URL: ${diagnostics.oauthCallbackUrl}`,
            `Clerk frontend API: ${diagnostics.clerkFrontendApi}`,
            `Key preview: ${diagnostics.keyPreview}`,
            `Status: ${statusEl.textContent || 'unknown'}`,
            `Last error: ${lastError || 'none'}`,
          ].join('\n');
        }

        async function copyDiagnostics() {
          const text = buildDiagnostics();
          try {
            await navigator.clipboard.writeText(text);
            copyButton.textContent = 'Copied';
            window.setTimeout(() => {
              copyButton.textContent = 'Copy diagnostics';
            }, 1500);
          } catch (_) {
            copyButton.textContent = 'Copy failed';
          }
        }

        function renderMeta() {
          const diagnostics = bridge.getDiagnostics();
          metaEl.replaceChildren(
            ...[
            `Build commit: ${diagnostics.buildCommitSha}`,
            `Build environment: ${diagnostics.buildEnvironment}`,
            `Build timestamp: ${diagnostics.buildTimestamp}`,
            `Configured app URL: ${diagnostics.configuredAppWebUrl}`,
            `Current origin: ${diagnostics.currentOrigin}`,
            `Origin matches configured app: ${diagnostics.currentOriginMatchesConfiguredApp}`,
            `OAuth callback URL: ${diagnostics.oauthCallbackUrl}`,
            `Clerk frontend API: ${diagnostics.clerkFrontendApi}`,
            `Key preview: ${diagnostics.keyPreview}`,
          ].map((line) => {
              const item = document.createElement('div');
              item.textContent = line;
              return item;
            }),
          );
        }

        async function bootstrap() {
          try {
            renderMeta();
            await bridge.load();
            if (await bridge.isSignedIn()) {
              setStatus('Session already active. Redirecting…');
              window.location.replace('/#/entry');
              return;
            }

            await bridge.mountSignIn(signInNode);
            setStatus('Ready.');
          } catch (error) {
            console.error('[ContentGlowz] Clerk sign-in bootstrap failed.', error);
            setStatus(String(error), true);
          }
        }

        copyButton.addEventListener('click', copyDiagnostics);

        entryButton.addEventListener('click', () => {
          window.location.assign('/#/entry');
        });

        bootstrap();
      })();
    </script>
  </body>
</html>
