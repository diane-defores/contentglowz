name: ContentGlowz Android Checks and Manual APK

on:
  push:
    paths:
      - "app/**"
      - ".github/workflows/android-apk.yml"
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/android-apk.yml"

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FLUTTER_VERSION_FILE: app/.fvmrc
  APP_DIR: app
  API_BASE_URL: ${{ vars.API_BASE_URL || 'https://api.contentglowz.com' }}
  APP_SITE_URL: ${{ vars.APP_SITE_URL || 'https://contentglowz.com' }}
  APP_WEB_URL: ${{ vars.APP_WEB_URL || 'https://app.contentglowz.com' }}
  CLERK_PUBLISHABLE_KEY: ${{ secrets.CLERK_PUBLISHABLE_KEY }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
  SENTRY_ENVIRONMENT: ${{ vars.SENTRY_ENVIRONMENT || 'github-actions' }}
  SENTRY_TRACES_SAMPLE_RATE: ${{ vars.SENTRY_TRACES_SAMPLE_RATE || '0.0' }}
  SENTRY_SEND_DEFAULT_PII: ${{ vars.SENTRY_SEND_DEFAULT_PII || 'false' }}
  SENTRY_DEBUG: ${{ vars.SENTRY_DEBUG || 'false' }}

jobs:
  flutter-checks:
    name: Android checks
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version-file: ${{ env.FLUTTER_VERSION_FILE }}
          cache: true

      - name: Print Flutter version
        run: flutter --version

      - name: Install dependencies
        working-directory: ${{ env.APP_DIR }}
        run: flutter pub get

      - name: Analyze
        working-directory: ${{ env.APP_DIR }}
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run tests
        working-directory: ${{ env.APP_DIR }}
        run: flutter test
