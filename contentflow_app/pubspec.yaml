name: contentflow_app
description: "Human-led AI content workspace for review, scheduling, and supported publishing flows."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.9

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.2.2

  # Swipeable cards
  flutter_card_swiper: ^7.2.0

  # HTTP client
  dio: ^5.9.2

  # Markdown rendering
  flutter_markdown: ^0.7.7+1

  # Local storage
  shared_preferences: ^2.5.5

  # Date formatting
  intl: ^0.20.2

  # Web interop
  web: ^1.1.1

  # JSON serialization
  json_annotation: ^4.9.0

  # Cached network images
  cached_network_image: ^3.4.1

  # URL launcher
  url_launcher: ^6.3.2

  # Responsive layout
  responsive_framework: ^1.5.1

  # Google Fonts
  google_fonts: ^8.0.2

  # Audio feedback
  record: ^6.2.0
  audioplayers: ^6.6.0

  # Error monitoring
  sentry_flutter: ^9.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  json_serializable: ^6.9.5
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
